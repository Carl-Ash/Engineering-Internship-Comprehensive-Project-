spring:
  application:
    name: code-gen-backend
  profiles:
    active: local
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/code_gen
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6380
      database: 0
      password:
      ttl: 3600
  # session 配置
  session:
    store-type: redis
    timeout: 2592000
server:
    port: 8080
    servlet:
      context-path: /api
      # cookie 30 天过期
      session:
        cookie:
          max-age: 2592000
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.carl.codegen.controller
# knife4j setting
knife4j:
  enable: true
  setting:
    language: zh_cn