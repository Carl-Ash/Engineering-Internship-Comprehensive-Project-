spring:
  application:
    name: code-gen-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/code_gen
    username: root
    password: root
server:
    port: 8080
    servlet:
      context-path: /api
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.carl.codegen.controller
# knife4j setting
knife4j:
  enable: true
  setting:
    language: zh_cn